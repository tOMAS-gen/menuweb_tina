name: Build y publicar imagen Docker

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  # GHCR exige el owner en minúsculas — no usar github.repository_owner
  # directo acá porque preserva mayúsculas (tOMAS-gen).
  IMAGE: ghcr.io/tomas-gen/menuweb_tina

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
